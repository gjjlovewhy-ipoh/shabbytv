name: IPTV 每小时自动抓取

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点自动运行
  workflow_dispatch:     # 支持手动点击立即运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 执行抓取脚本
        run: python iptv_spider.py

      - name: 提交更新文件
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add iptv.txt
          git commit -m "自动更新IPTV频道 - 每小时定时任务"
          git push
